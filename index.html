<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metrónomo & Afinador</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0e8;
    --ink: #1a1208;
    --line: #c8b99a;
    --accent: #8b3a1e;
    --muted: #7a6a55;
    --surface: #ede5d4;
    --hover-bg: #e5dac6;
    --active: #8b3a1e;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 2.5rem 1.5rem 4rem;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 28px,
      var(--line) 28px, var(--line) 29px
    );
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2.5rem;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 1.2rem;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  h1 em { font-style: italic; color: var(--accent); }

  .subtitle {
    margin-top: 0.5rem;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.8;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1.5px solid var(--ink);
    margin-bottom: 2rem;
  }

  .tab-btn {
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    margin-bottom: -1.5px;
    padding: 0.6rem 1.4rem 0.7rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }

  .tab-btn.active {
    color: var(--ink);
    border-bottom-color: var(--accent);
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ─── METRONOME ─── */
  .bpm-display {
    text-align: center;
    margin-bottom: 2rem;
  }

  .bpm-number {
    font-family: 'Playfair Display', serif;
    font-size: clamp(4rem, 15vw, 6.5rem);
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.03em;
    color: var(--ink);
    transition: color 0.05s;
  }

  .bpm-label {
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 0.3rem;
  }

  .tempo-name {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--accent);
    margin-top: 0.25rem;
    min-height: 1.4em;
  }

  /* Pendulum */
  .pendulum-wrap {
    display: flex;
    justify-content: center;
    margin: 1.5rem 0 1.8rem;
  }

  #pendulum-svg { overflow: visible; }

  /* Slider */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 1.5rem;
  }

  .slider-row label {
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    width: 2.2rem;
    flex-shrink: 0;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 2px;
    background: var(--line);
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--ink);
    border: 2px solid var(--bg);
    box-shadow: 0 0 0 1.5px var(--ink);
    cursor: pointer;
    transition: background 0.15s;
  }

  input[type=range]::-webkit-slider-thumb:hover { background: var(--accent); box-shadow: 0 0 0 1.5px var(--accent); }

  .slider-val {
    font-size: 0.78rem;
    min-width: 2.2rem;
    text-align: right;
    color: var(--muted);
  }

  /* Beat grid */
  .beat-grid {
    display: flex;
    justify-content: center;
    gap: 0.6rem;
    margin-bottom: 1.8rem;
  }

  .beat-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 1.5px solid var(--muted);
    background: transparent;
    transition: background 0.05s, border-color 0.05s;
  }

  .beat-dot.on { background: var(--accent); border-color: var(--accent); }
  .beat-dot.accent { width: 14px; height: 14px; }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 0.8rem;
    justify-content: center;
    margin-bottom: 1.5rem;
  }

  .btn {
    background: none;
    border: 1.5px solid var(--ink);
    padding: 0.55rem 1.6rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .btn:hover { background: var(--hover-bg); }

  .btn.primary {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }

  .btn.primary:hover { background: var(--accent); border-color: var(--accent); }

  /* Time signature */
  .sig-row {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    justify-content: center;
    margin-bottom: 1.5rem;
  }

  .sig-label {
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .sig-spinner {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    border: 1.5px solid var(--ink);
    padding: 0.4rem 0.8rem;
  }

  .sig-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.1rem;
  }

  .spin-btn {
    background: none;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    line-height: 1;
    color: var(--muted);
    cursor: pointer;
    padding: 0.1rem 0.3rem;
    transition: color 0.15s;
    user-select: none;
  }

  .spin-btn:hover { color: var(--accent); }
  .spin-btn:active { transform: scale(0.9); }

  .sig-fraction {
    display: flex;
    align-items: center;
    gap: 0.15rem;
    min-width: 3rem;
    justify-content: center;
  }

  #sig-top, #sig-bottom {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    line-height: 1;
    min-width: 1.2rem;
    text-align: center;
    transition: color 0.15s;
  }

  .sig-slash {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--muted);
    margin: 0 0.15rem;
    line-height: 1;
  }

  /* ─── TUNER ─── */
  .tuner-display {
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .note-big {
    font-family: 'Playfair Display', serif;
    font-size: clamp(4rem, 15vw, 6.5rem);
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .note-big .octave {
    font-size: 0.4em;
    vertical-align: super;
    color: var(--muted);
    font-style: italic;
  }

  .freq-display {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 0.4rem;
    min-height: 1.2em;
  }

  /* Tuning meter */
  .meter-wrap {
    margin: 1.5rem auto;
    max-width: 400px;
    position: relative;
  }

  .meter-bar {
    height: 4px;
    background: var(--line);
    border-radius: 2px;
    position: relative;
    overflow: visible;
  }

  .meter-center {
    position: absolute;
    left: 50%;
    top: -6px;
    transform: translateX(-50%);
    width: 1.5px;
    height: 16px;
    background: var(--ink);
  }

  .meter-needle {
    position: absolute;
    top: -8px;
    width: 3px;
    height: 20px;
    background: var(--accent);
    border-radius: 2px;
    transform: translateX(-50%);
    transition: left 0.12s ease-out;
    left: 50%;
  }

  .meter-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 0.6rem;
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .tune-status {
    text-align: center;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 1rem;
    min-height: 1.2em;
    color: var(--accent);
    transition: color 0.2s;
  }

  .tune-status.in-tune { color: #3a6e28; }

  /* Ref tuning */
  .ref-row {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    max-width: 400px;
    margin: 1.5rem auto 1.5rem;
  }

  .ref-row label {
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    width: 4rem;
    flex-shrink: 0;
  }

  /* Chromatic grid */
  .chroma-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    justify-content: center;
    margin: 0.5rem 0 1.5rem;
  }

  .note-pill {
    font-size: 0.75rem;
    padding: 0.25rem 0.6rem;
    border: 1px solid var(--line);
    color: var(--muted);
    min-width: 2.2rem;
    text-align: center;
    transition: all 0.1s;
  }

  .note-pill.active {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }

  .note-pill.close {
    border-color: var(--accent);
    color: var(--accent);
  }

  .mic-status {
    text-align: center;
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 1rem;
    letter-spacing: 0.06em;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--line);
    margin: 1.5rem 0;
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <h1><em>music</em>Tools</h1>
    <p class="subtitle">Metrónomo · Afinador</p>
  </header>

  <div class="tabs">
    <button class="tab-btn active" data-tab="metro">♩ Metrónomo</button>
    <button class="tab-btn" data-tab="tuner">♪ Afinador</button>
  </div>

  <!-- ═══════════ METRONOME ═══════════ -->
  <div class="tab-panel active" id="tab-metro">

    <div class="bpm-display">
      <div class="bpm-number" id="bpm-num">120</div>
      <div class="bpm-label">BPM</div>
      <div class="tempo-name" id="tempo-name">Allegro</div>
    </div>

    <div class="pendulum-wrap">
      <svg id="pendulum-svg" width="80" height="100" viewBox="0 0 80 100">
        <line x1="40" y1="8" x2="40" y2="8" stroke="#c8b99a" stroke-width="1.5" id="pend-line"/>
        <circle id="pend-bob" cx="40" cy="85" r="8" fill="#1a1208"/>
        <circle cx="40" cy="8" r="3" fill="#8b3a1e"/>
      </svg>
    </div>

    <!-- Beat dots -->
    <div class="beat-grid" id="beat-grid"></div>

    <!-- BPM slider -->
    <div class="slider-row">
      <label>BPM</label>
      <button class="spin-btn" id="bpm-minus">&#x2212;</button>
      <input type="range" id="bpm-slider" min="30" max="240" value="120" step="1">
      <button class="spin-btn" id="bpm-plus">+</button>
      <span class="slider-val" id="bpm-slider-val">120</span>
    </div>

    <!-- Time signature -->
    <div class="sig-row">
      <span class="sig-label">Compás</span>
      <div class="sig-spinner">
        <div class="sig-col">
          <button class="spin-btn" id="sig-num-plus">+</button>
          <span id="sig-top">4</span>
          <button class="spin-btn" id="sig-num-minus">&#x2212;</button>
        </div>
        <span class="sig-slash">/</span>
        <div class="sig-col">
          <button class="spin-btn" id="sig-den-plus">+</button>
          <span id="sig-bottom">4</span>
          <button class="spin-btn" id="sig-den-minus">&#x2212;</button>
        </div>
      </div>
    </div>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="btn" id="tap-btn">Tap</button>
      <button class="btn primary" id="play-btn">▶ Iniciar</button>
    </div>

  </div>

  <!-- ═══════════ TUNER ═══════════ -->
  <div class="tab-panel" id="tab-tuner">

    <p class="mic-status" id="mic-status">Presioná "Activar micrófono" para afinar</p>

    <div class="tuner-display">
      <div class="note-big" id="note-display">–<span class="octave"></span></div>
      <div class="freq-display" id="freq-display"></div>
    </div>

    <div class="meter-wrap">
      <div class="meter-bar">
        <div class="meter-center"></div>
        <div class="meter-needle" id="meter-needle"></div>
      </div>
      <div class="meter-labels">
        <span>−50¢</span><span>−25¢</span><span>0</span><span>+25¢</span><span>+50¢</span>
      </div>
    </div>

    <div class="tune-status" id="tune-status"></div>

    <div class="chroma-grid" id="chroma-grid"></div>

    <hr class="divider">

    <div class="ref-row">
      <label>La ref.</label>
      <input type="range" id="ref-slider" min="430" max="450" value="440" step="1">
      <span class="slider-val" id="ref-val">440 Hz</span>
    </div>

    <div class="btn-row">
      <button class="btn primary" id="mic-btn">Activar micrófono</button>
    </div>

  </div>

</div>

<script>
// ═══════════════ UTILITIES ═══════════════
const $ = id => document.getElementById(id);

// ═══════════════ TABS ═══════════════
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    $('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// ═══════════════ METRONOME ═══════════════
const TEMPOS = [
  [20, 'Larghissimo'], [40, 'Largo'], [60, 'Larghetto'],
  [66, 'Adagio'], [76, 'Andante'], [108, 'Moderato'],
  [120, 'Allegretto'], [132, 'Allegro'], [168, 'Presto'],
  [200, 'Prestissimo'], [999, 'Prestissimo']
];

function getTempoName(bpm) {
  for (let i = 0; i < TEMPOS.length - 1; i++) {
    if (bpm < TEMPOS[i+1][0]) return TEMPOS[i][1];
  }
  return 'Prestissimo';
}

let bpm = 120, beats = 4, isPlaying = false;
let audioCtx = null;
let tapTimes = [], tapTimer = null;

// Pendulum
let pendAngle = 0, pendDir = 1, pendAnimId = null, pendLastTime = null;

// Web Audio scheduler — no drift
const LOOKAHEAD = 0.1;    // seconds ahead to schedule
const SCHEDULE_MS = 25;   // how often the scheduler runs (ms)
let nextBeatTime = 0;
let currentBeat = 0;
let schedulerTimer = null;
// Queue of {audioTime, beat} for the visual callback
let visualQueue = [];

function buildBeatGrid() {
  const grid = $('beat-grid');
  grid.innerHTML = '';
  for (let i = 0; i < beats; i++) {
    const d = document.createElement('div');
    d.className = 'beat-dot' + (i === 0 ? ' accent' : '');
    grid.appendChild(d);
  }
}

function updateBeatDots(beat) {
  const dots = document.querySelectorAll('.beat-dot');
  dots.forEach((d, i) => d.classList.toggle('on', i === beat));
}

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function scheduleClick(audioTime, accent) {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.frequency.value = accent ? 1200 : 800;
  gain.gain.setValueAtTime(accent ? 0.55 : 0.3, audioTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioTime + 0.08);
  osc.start(audioTime);
  osc.stop(audioTime + 0.1);
}

// A quarter note at BPM = 60/bpm seconds.
// Denominator tells us the note value of each beat:
//   /4 → quarter note (×1), /8 → eighth note (×0.5), /2 → half note (×2), /16 → sixteenth (×0.25)
function beatDuration() {
  const den = SIG_DENOMINATORS[sigDenIdx];
  return (60 / bpm) * (4 / den);
}

function scheduler() {
  const ctx = getAudioCtx();
  while (nextBeatTime < ctx.currentTime + LOOKAHEAD) {
    scheduleClick(nextBeatTime, currentBeat === 0);
    visualQueue.push({ time: nextBeatTime, beat: currentBeat });
    currentBeat = (currentBeat + 1) % beats;
    nextBeatTime += beatDuration();
  }
}

// rAF loop that flushes the visual queue at the right moment
function visualLoop(ts) {
  if (!isPlaying) return;
  const ctx = getAudioCtx();
  const now = ctx.currentTime;
  while (visualQueue.length && visualQueue[0].time <= now + 0.01) {
    const evt = visualQueue.shift();
    updateBeatDots(evt.beat);
    $('bpm-num').style.color = '#8b3a1e';
    setTimeout(() => { $('bpm-num').style.color = ''; }, 60);
  }
  pendAnimId = requestAnimationFrame(visualLoop);
  animatePendulumStep(ts);
}

function animatePendulumStep(ts) {
  if (!pendLastTime) pendLastTime = ts;
  const dt = Math.min((ts - pendLastTime) / 1000, 0.05);
  pendLastTime = ts;
  const speed = (bpm / 60) * 160;
  pendAngle += pendDir * speed * dt;
  if (pendAngle > 30) { pendAngle = 30; pendDir = -1; }
  if (pendAngle < -30) { pendAngle = -30; pendDir = 1; }
  const rad = pendAngle * Math.PI / 180;
  const x = 40 + 77 * Math.sin(rad);
  const y = 8 + 77 * Math.cos(rad);
  $('pend-bob').setAttribute('cx', x.toFixed(1));
  $('pend-bob').setAttribute('cy', y.toFixed(1));
  $('pend-line').setAttribute('x2', x.toFixed(1));
  $('pend-line').setAttribute('y2', y.toFixed(1));
}

function startMetro() {
  if (isPlaying) return;
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
  isPlaying = true;
  currentBeat = 0;
  nextBeatTime = ctx.currentTime + 0.05;
  visualQueue = [];
  $('play-btn').textContent = '■ Detener';
  pendLastTime = null;
  scheduler();
  schedulerTimer = setInterval(scheduler, SCHEDULE_MS);
  pendAnimId = requestAnimationFrame(visualLoop);
}

function stopMetro() {
  isPlaying = false;
  clearInterval(schedulerTimer);
  cancelAnimationFrame(pendAnimId);
  visualQueue = [];
  $('play-btn').textContent = '▶ Iniciar';
  updateBeatDots(-1);
  pendAngle = 0;
  $('pend-bob').setAttribute('cx', 40); $('pend-bob').setAttribute('cy', 85);
  $('pend-line').setAttribute('x2', 40); $('pend-line').setAttribute('y2', 85);
}

function setBPM(val) {
  bpm = Math.max(30, Math.min(240, val));
  $('bpm-num').textContent = bpm;
  $('bpm-slider').value = bpm;
  $('bpm-slider-val').textContent = bpm;
  $('tempo-name').textContent = getTempoName(bpm);
  // No need to restart — scheduler picks up new bpm on next iteration
}

$('play-btn').addEventListener('click', () => isPlaying ? stopMetro() : startMetro());

$('bpm-slider').addEventListener('input', e => setBPM(+e.target.value));
$('bpm-minus').addEventListener('click', () => setBPM(bpm - 1));
$('bpm-plus').addEventListener('click', () => setBPM(bpm + 1));

// Tap tempo
$('tap-btn').addEventListener('click', () => {
  const now = Date.now();
  tapTimes.push(now);
  if (tapTimes.length > 8) tapTimes.shift();
  clearTimeout(tapTimer);
  tapTimer = setTimeout(() => { tapTimes = []; }, 2500);
  if (tapTimes.length >= 2) {
    const intervals = [];
    for (let i = 1; i < tapTimes.length; i++) intervals.push(tapTimes[i] - tapTimes[i-1]);
    const avg = intervals.reduce((a, b) => a + b, 0) / intervals.length;
    setBPM(Math.round(60000 / avg));
  }
});

// Time signature spinner
const SIG_NUMERATORS = [2,3,4,5,6,7,8,9,12];
const SIG_DENOMINATORS = [2,4,8,16];
let sigNumIdx = 2;   // default 4
let sigDenIdx = 1;   // default 4

function flash(el) {
  el.style.color = 'var(--accent)';
  setTimeout(() => { el.style.color = ''; }, 180);
}

function updateSig() {
  beats = SIG_NUMERATORS[sigNumIdx];
  $('sig-top').textContent = beats;
  $('sig-bottom').textContent = SIG_DENOMINATORS[sigDenIdx];
  // currentBeat reset so accent lands on 1 again
  currentBeat = 0;
  buildBeatGrid();
  // No restart needed — scheduler reads beats & beatDuration() on next loop
}

$('sig-num-minus').addEventListener('click', () => {
  sigNumIdx = Math.max(0, sigNumIdx - 1);
  flash($('sig-top')); updateSig();
});
$('sig-num-plus').addEventListener('click', () => {
  sigNumIdx = Math.min(SIG_NUMERATORS.length - 1, sigNumIdx + 1);
  flash($('sig-top')); updateSig();
});
$('sig-den-minus').addEventListener('click', () => {
  sigDenIdx = Math.max(0, sigDenIdx - 1);
  flash($('sig-bottom')); updateSig();
});
$('sig-den-plus').addEventListener('click', () => {
  sigDenIdx = Math.min(SIG_DENOMINATORS.length - 1, sigDenIdx + 1);
  flash($('sig-bottom')); updateSig();
});

// Init display
beats = SIG_NUMERATORS[sigNumIdx];
$('sig-top').textContent = beats;
$('sig-bottom').textContent = SIG_DENOMINATORS[sigDenIdx];

buildBeatGrid();
$('tempo-name').textContent = getTempoName(bpm);

// BPM +/- on click on number
$('bpm-num').style.cursor = 'default';

// ═══════════════ TUNER ═══════════════
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
let refA = 440, tunerActive = false;
let analyserNode = null, tunerAnimId = null, micStream = null;

// Build chromatic pills
const grid = $('chroma-grid');
NOTES.forEach(n => {
  const span = document.createElement('span');
  span.className = 'note-pill';
  span.textContent = n;
  span.dataset.note = n;
  grid.appendChild(span);
});

function freqToNote(freq) {
  const semitones = 12 * Math.log2(freq / refA);
  const midi = Math.round(semitones) + 69;
  const noteIdx = ((midi % 12) + 12) % 12;
  const octave = Math.floor(midi / 12) - 1;
  const exactSemitones = semitones + 69 - midi;
  const cents = exactSemitones * 100;
  return { name: NOTES[noteIdx], octave, cents: Math.round(cents * 10) / 10 };
}

function autoCorrelate(buf, sampleRate) {
  let SIZE = buf.length;
  let rms = 0;
  for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
  rms = Math.sqrt(rms / SIZE);
  if (rms < 0.01) return -1;

  let r1 = 0, r2 = SIZE - 1;
  for (let i = 0; i < SIZE / 2; i++) { if (Math.abs(buf[i]) < 0.2) { r1 = i; break; } }
  for (let i = 1; i < SIZE / 2; i++) { if (Math.abs(buf[SIZE - i]) < 0.2) { r2 = SIZE - i; break; } }
  buf = buf.slice(r1, r2);
  SIZE = buf.length;

  const c = new Float32Array(SIZE).fill(0);
  for (let i = 0; i < SIZE; i++)
    for (let j = 0; j < SIZE - i; j++)
      c[i] += buf[j] * buf[j + i];

  let d = 0;
  while (c[d] > c[d + 1]) d++;
  let maxval = -1, maxpos = -1;
  for (let i = d; i < SIZE; i++) { if (c[i] > maxval) { maxval = c[i]; maxpos = i; } }
  let T0 = maxpos;
  const x1 = c[T0 - 1], x2 = c[T0], x3 = c[T0 + 1];
  const a = (x1 + x3 - 2 * x2) / 2, b = (x3 - x1) / 2;
  if (a) T0 = T0 - b / (2 * a);
  return sampleRate / T0;
}

function updateTuner() {
  if (!analyserNode || !tunerActive) return;
  const buf = new Float32Array(analyserNode.fftSize);
  analyserNode.getFloatTimeDomainData(buf);
  const freq = autoCorrelate(buf, analyserNode.context.sampleRate);

  if (freq > 50 && freq < 5000) {
    const { name, octave, cents } = freqToNote(freq);
    $('note-display').innerHTML = name + `<span class="octave">${octave}</span>`;
    $('freq-display').textContent = freq.toFixed(1) + ' Hz';

    const pct = Math.max(0, Math.min(100, 50 + cents));
    $('meter-needle').style.left = pct + '%';

    const absCents = Math.abs(cents);
    let status, cls;
    if (absCents < 5) { status = 'En tono'; cls = 'tune-status in-tune'; }
    else if (cents < 0) { status = 'Muy bajo (' + cents + '¢)'; cls = 'tune-status'; }
    else { status = 'Muy alto (+' + cents + '¢)'; cls = 'tune-status'; }
    const st = $('tune-status');
    st.textContent = status;
    st.className = cls;

    document.querySelectorAll('.note-pill').forEach(p => {
      p.classList.remove('active', 'close');
      if (p.dataset.note === name) p.classList.add(absCents < 5 ? 'active' : 'close');
    });
  } else {
    $('note-display').innerHTML = '–<span class="octave"></span>';
    $('freq-display').textContent = '';
    $('tune-status').textContent = 'Sin señal';
    $('meter-needle').style.left = '50%';
    document.querySelectorAll('.note-pill').forEach(p => p.classList.remove('active', 'close'));
  }

  tunerAnimId = requestAnimationFrame(updateTuner);
}

$('mic-btn').addEventListener('click', async () => {
  if (tunerActive) {
    tunerActive = false;
    cancelAnimationFrame(tunerAnimId);
    if (micStream) micStream.getTracks().forEach(t => t.stop());
    $('mic-btn').textContent = 'Activar micrófono';
    $('mic-status').textContent = 'Micrófono desactivado';
    $('note-display').innerHTML = '–<span class="octave"></span>';
    $('freq-display').textContent = '';
    $('tune-status').textContent = '';
    $('meter-needle').style.left = '50%';
    document.querySelectorAll('.note-pill').forEach(p => p.classList.remove('active', 'close'));
    return;
  }
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const ctx = getAudioCtx();
    const src = ctx.createMediaStreamSource(micStream);
    analyserNode = ctx.createAnalyser();
    analyserNode.fftSize = 2048;
    src.connect(analyserNode);
    tunerActive = true;
    $('mic-btn').textContent = '■ Desactivar';
    $('mic-status').textContent = 'Escuchando…';
    updateTuner();
  } catch (e) {
    $('mic-status').textContent = 'No se pudo acceder al micrófono.';
  }
});

$('ref-slider').addEventListener('input', e => {
  refA = +e.target.value;
  $('ref-val').textContent = refA + ' Hz';
});
</script>
</body>
</html>
